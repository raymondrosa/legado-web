<!DOCTYPE html>
<html lang="es">
    <head>
<style>
    .bg-gold-gradient {
        background: linear-gradient(45deg, #d4af37, #f9e29c, #b8860b);
        background-size: 200% 200%;
        animation: gradient-move 5s ease infinite;
    }

    @keyframes gradient-move {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
</style>
    
    
    <meta charset="UTF-8">
    <title>Contacto - Raymond Rosa Ávila</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-900 text-stone-300 p-10">
    <div class="max-w-2xl mx-auto text-center">
        <h1 class="text-3xl text-gold mb-6 serif">Contacto</h1>
        <p class="mb-10">Si desea compartir sus reflexiones sobre la obra o realizar una consulta, estaré encantado de leerle.</p>

        <form action="https://formspree.io/f/mojbdbvb" method="POST" class="text-left space-y-4">
            <div>
                <label class="block mb-1">Nombre</label>
                <input type="text" name="nombre" required class="w-full px-4 py-2 rounded bg-white/10 border border-white/20 text-white focus:border-gold outline-none">
            </div>
            <div>
                <label class="block mb-1">Correo Electrónico</label>
                <input type="email" name="email" required class="w-full px-4 py-2 rounded bg-white/10 border border-white/20 text-white focus:border-gold outline-none">
            </div>
            <div>
                <label class="block mb-1">Mensaje</label>
                <textarea name="mensaje" rows="5" required class="w-full px-4 py-2 rounded bg-white/10 border border-white/20 text-white focus:border-gold outline-none"></textarea>
            </div>
            <button type="submit" class="w-full bg-gold-gradient py-3 rounded-full text-stone-900 font-bold uppercase tracking-widest hover:scale-105 transition">Enviar Mensaje</button>
        </form>
        <a href="index.html" class="inline-block mt-10 text-gold hover:underline">← Volver al inicio</a>
    </div>
</body>
</html>
